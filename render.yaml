services:
  - type: web
    name: tonlove-api
    runtime: go
    repo: https://github.com/Leonov792/tonlove
    plan: free
    branch: master
    buildCommand: cd backend && go build -o server .
    startCommand: cd backend && ./server
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tonlove-db
          property: connectionString
      - key: PORT
        value: "10000"

databases:
  - name: tonlove-db
    plan: free
